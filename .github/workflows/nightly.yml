name: Nightly

on:
  schedule:
    - cron: '0 2 * * *'  # 02:00 UTC every night
  workflow_dispatch:      # manual trigger

jobs:
  build:
    name: Build (NativeAOT)
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Generate Secrets.g.cs
        shell: pwsh
        env:
          CLIENT_SECRET_JSON: ${{ secrets.GOOGLE_CLIENT_SECRET_JSON }}
        run: |
          $secretsPath = Join-Path $env:GITHUB_WORKSPACE "client_secret.json"
          $env:CLIENT_SECRET_JSON | Set-Content -Path $secretsPath -Encoding UTF8
          $outputPath = Join-Path $env:GITHUB_WORKSPACE "Meridian/Auth/Secrets.g.cs"
          & "$env:GITHUB_WORKSPACE/Meridian/generate-secrets.ps1" -SecretsJson $secretsPath -OutputFile $outputPath
          Write-Host "Generated Secrets.g.cs:"
          Get-Content $outputPath

      - name: Publish (NativeAOT)
        shell: pwsh
        run: |
          dotnet publish Meridian/Meridian.csproj -p:PublishProfile=win-x64-release

      - name: Package (portable zip)
        shell: pwsh
        run: |
          $version = "nightly-$(Get-Date -Format 'yyyyMMdd')"
          Compress-Archive `
            -Path "Meridian/bin/publish/win-x64/*" `
            -DestinationPath "Meridian-$version.zip"
          echo "ZIP_NAME=Meridian-$version.zip" >> $env:GITHUB_ENV
          echo "PKG_VERSION=$version" >> $env:GITHUB_ENV
          echo "RELEASE_TAG=nightly" >> $env:GITHUB_ENV
          echo "RELEASE_NAME=Nightly $((Get-Date -Format 'yyyy-MM-dd'))" >> $env:GITHUB_ENV

      - name: Package (MSIX installer)
        shell: pwsh
        env:
          DEV_PFX_BASE64: ${{ secrets.MERIDIAN_DEV_PFX_BASE64 }}
          DEV_PFX_PASSWORD: ${{ secrets.MERIDIAN_DEV_PFX_PASSWORD }}
        run: |
          # build-msix.ps1 reuses the AOT publish above (-SkipPublish), then
          # SDK-builds a throwaway packaged copy of the project to obtain the
          # correct package resources.pri + payload (the AOT publish can't make a
          # usable package PRI — see notes/packaged-msix-aot-needs-sdk-resources-pri.md),
          # overlays the AOT exe, packs, and signs.
          #
          # Sign with a STABLE dev .pfx from a GitHub secret (not -DevSign, which on a
          # runner mints a throwaway cert per build that nobody can trust). Every
          # nightly gets the same signer, so anyone who trusts that one dev cert can
          # install any nightly. This is the same secret->signtool plumbing #7 will
          # use with the real cert — only the secret changes.
          # DEV-SIGNED, NOT FOR PRODUCTION — TODO(#7): swap the secret for the real cert.
          #
          # The throwaway build re-runs generate-secrets.ps1, so it needs
          # client_secret.json at repo root (created in the build job above).
          # MSIX Version must be x.y.z.0 (numeric) — derive from the date.
          $msixVer = "$(Get-Date -Format 'yyyy.M.d').0"
          $pfx = Join-Path $env:RUNNER_TEMP 'meridian-dev.pfx'
          # Strip any whitespace/newlines the secret may carry (gh secret set /
          # storage can append a trailing newline) — FromBase64String rejects it.
          $b64 = ($env:DEV_PFX_BASE64 -replace '\s', '')
          [System.IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($b64))
          # Trim a possible trailing newline on the password secret too, else
          # signtool would reject the .pfx with a wrong-password error.
          $pfxPw = $env:DEV_PFX_PASSWORD.Trim()
          ./packaging/build-msix.ps1 -SkipPublish -PfxPath $pfx -PfxPassword $pfxPw -Version $msixVer
          Remove-Item $pfx -Force
          $src = "packaging/out/Meridian.msix"
          $dst = "Meridian-$env:PKG_VERSION.msix"
          Copy-Item $src $dst -Force
          echo "MSIX_NAME=$dst" >> $env:GITHUB_ENV

      - name: Delete previous nightly release and tag
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete $env:RELEASE_TAG --cleanup-tag --yes --repo $env:GITHUB_REPOSITORY 2>&1 | Out-Host
          if ($LASTEXITCODE -ne 0) { Write-Host "No previous release/tag to delete (ok on first run)." }
          $LASTEXITCODE = 0

      - name: Update nightly release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_NAME }}
          prerelease: true
          files: |
            ${{ env.ZIP_NAME }}
            ${{ env.MSIX_NAME }}
          target_commitish: ${{ github.sha }}
          make_latest: "false"
